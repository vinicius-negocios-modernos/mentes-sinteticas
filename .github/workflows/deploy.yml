name: Build and Push to GHCR

on:
  push:
    branches: [main]
  workflow_dispatch:

# Deploy strategy: VPS runs a cron job (every 1 min) that pulls the latest
# image from GHCR and redeploys via `docker stack deploy` if a new image is
# detected. See /opt/mentes-sinteticas/auto-deploy.sh on the VPS.
#
# Database migrations: apply manually via SSH tunnel when needed.
#   ssh -L 15432:postgres_postgres:5432 root@76.13.82.80
#   psql -h localhost -p 15432 -U postgres -d mentes_sinteticas < drizzle/NNNN_migration.sql

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: vinicius-negocios-modernos/mentes-sinteticas

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
