<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a55a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8c872;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>
  <!-- Stylized brain/constellation: two hemispheres connected by neural paths -->
  <g fill="none" stroke="url(#gold)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left hemisphere arc -->
    <path d="M8 16 C8 10, 12 7, 16 7"/>
    <!-- Right hemisphere arc -->
    <path d="M24 16 C24 10, 20 7, 16 7"/>
    <!-- Lower arcs -->
    <path d="M8 16 C8 22, 12 25, 16 25"/>
    <path d="M24 16 C24 22, 20 25, 16 25"/>
    <!-- Neural connections -->
    <line x1="11" y1="12" x2="16" y2="14"/>
    <line x1="21" y1="12" x2="16" y2="14"/>
    <line x1="12" y1="20" x2="16" y2="18"/>
    <line x1="20" y1="20" x2="16" y2="18"/>
    <line x1="16" y1="14" x2="16" y2="18"/>
  </g>
  <!-- Neural nodes -->
  <g fill="#c9a55a">
    <circle cx="8" cy="16" r="1.5"/>
    <circle cx="24" cy="16" r="1.5"/>
    <circle cx="16" cy="7" r="1.5"/>
    <circle cx="16" cy="25" r="1.5"/>
    <circle cx="11" cy="12" r="1.2"/>
    <circle cx="21" cy="12" r="1.2"/>
    <circle cx="12" cy="20" r="1.2"/>
    <circle cx="20" cy="20" r="1.2"/>
    <circle cx="16" cy="14" r="1.4"/>
    <circle cx="16" cy="18" r="1.4"/>
  </g>
</svg>
